name: Ecosystem Contract Verification
on:
  push:
    branches: [main]
    paths:
      - 'src/organvm_engine/ecosystem/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install
        run: pip install -e .
      - name: Validate ecosystem profiles
        run: organvm ecosystem validate
