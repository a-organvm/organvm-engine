name: Ecosystem Sync Check
on:
  push:
    branches: [main]
    paths:
      - 'src/organvm_engine/ecosystem/**'
  workflow_dispatch:
jobs:
  sync-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: pip install -e .
      - name: Check for unsynced repos
        run: organvm ecosystem sync --dry-run
