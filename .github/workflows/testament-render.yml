name: Testament Auto-Render

on:
  push:
    branches: [main]
    paths:
      - 'src/organvm_engine/testament/**'
      - 'src/organvm_engine/registry/**'
      - 'src/organvm_engine/metrics/**'
      - 'src/organvm_engine/omega/**'

  workflow_dispatch:

permissions:
  contents: read

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install engine
        run: pip install -e .

      - name: Render testament artifacts
        run: |
          mkdir -p testament-output
          organvm testament render --write --output-dir testament-output
          organvm testament cascade --write --json > testament-output/cascade-manifest.json
          echo "Rendered $(ls testament-output/*.svg 2>/dev/null | wc -l) SVGs"

      - name: Upload testament artifacts
        uses: actions/upload-artifact@v4
        with:
          name: testament-artifacts-${{ github.sha }}
          path: testament-output/
          retention-days: 90
